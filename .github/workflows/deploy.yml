name: Build and Deploy to Itch
on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Zip your web files (excludes git junk)
      - name: Zip Web Files
        run: zip -r web-build.zip ./ -x "*.git*" ".github/*"

      # 2. Install the official itch.io "Butler" tool
      - name: Install Butler
        run: |
          curl -L -o butler.zip https://broth.itch.ovh/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      # 3. Push to itch.io
      - name: Upload to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push web-build.zip LennyXD/roguewave:html5
