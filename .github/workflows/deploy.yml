name: Build and Deploy to Itch
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate required secret
        run: |
          if [ -z "${{ secrets.BUTLER_API_KEY }}" ]; then
            echo "BUTLER_API_KEY is not set in repository secrets."
            exit 1
          fi

      # Package only runtime web files to avoid shipping repo metadata.
      - name: Zip Web Files
        run: |
          set -e
          rm -rf dist web-build.zip
          mkdir -p dist
          cp index.html game.js styles.css dist/
          if [ -d assets ]; then
            cp -R assets dist/
          fi
          (cd dist && zip -r ../web-build.zip .)

      - name: Install Butler
        uses: remarkablegames/setup-butler@v2

      - name: Upload to Itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          butler push web-build.zip LennyXD/roguewave:html5